version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # 如需自定义 pip/apt 源，可在 Dockerfile.backend 中修改
    container_name: claw-admin-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./claw_admin.db
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=true
    volumes:
      - ./backend:/app
      - backend-data:/app
    restart: unless-stopped
    networks:
      - claw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # Frontend Web
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # 如需自定义 npm 源，可在 Dockerfile.frontend 中修改
    container_name: claw-admin-frontend
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - claw-network
    depends_on:
      - backend

  # Nginx Reverse Proxy (optional for production)
  nginx:
    image: registry.k8s.io/ingress-nginx/nginx:v1.3.4
    container_name: claw-admin-nginx
    ports:
      - "8080:80"
      - "4433:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
    networks:
      - claw-network
    depends_on:
      - backend
      - frontend

volumes:
  backend-data:

networks:
  claw-network:
    driver: bridge
